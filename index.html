<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Budget Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- SheetJS — read/write the .xlsx file. Loaded synchronously so XLSX exists before the app compiles. -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <!-- Google Drive: Identity Services (sign-in) + Google API client (Picker). Load async. -->
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://apis.google.com/js/api.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .app { max-width: 1020px; margin: 0 auto; }

    /* ── Help banner ─────────────────────────────────────────────────────── */
    .help {
      background: #e8f0fe;
      border: 1px solid #c5d4f6;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      font-size: 13px;
      line-height: 1.6;
      color: #333;
    }
    .help h1 { font-size: 16px; font-weight: 600; color: #185FA5; margin-bottom: 0.3rem; }

    /* ── Metric cards ────────────────────────────────────────────────────── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .metric-card  { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 0.75rem 1rem; }
    .metric-label { font-size: 11px; color: #666; margin-bottom: 4px; line-height: 1.4; }
    .metric-value { font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; }

    /* ── Tabs ────────────────────────────────────────────────────────────── */
    .tab-bar { display: flex; gap: 2px; border-bottom: 1.5px solid #d8d8d8; margin-bottom: 1rem; }
    .tab-btn {
      padding: 7px 16px; font-size: 13px; font-weight: 500; border: none;
      background: transparent; cursor: pointer; color: #666;
      border-bottom: 2.5px solid transparent; margin-bottom: -1.5px;
      border-radius: 4px 4px 0 0; transition: color 0.1s; font-family: inherit;
    }
    .tab-btn:hover  { color: #185FA5; background: #f5f7ff; }
    .tab-btn.active { color: #185FA5; border-bottom-color: #185FA5; }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 1rem 1.125rem; }

    /* ── Section label ───────────────────────────────────────────────────── */
    .sec-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
      color: #888; text-transform: uppercase; margin-bottom: 0.875rem;
    }

    /* ── Income / cost post rows ─────────────────────────────────────────── */
    .post-row {
      display: flex; gap: 7px; align-items: center;
      padding: 7px 0; border-bottom: 0.5px solid #f2f2f2;
    }
    .post-row:last-of-type { border-bottom: none; }
    .post-name   { flex: 1; min-width: 0; }
    .post-amount { width: 88px; text-align: right; }
    .post-qty    { width: 58px; text-align: center; }
    .post-total  {
      width: 88px; font-size: 12px; font-weight: 500;
      font-variant-numeric: tabular-nums; text-align: right; flex-shrink: 0;
    }

    /* ── Type toggle (Fast | Per enhet) ──────────────────────────────────── */
    .type-toggle { display: inline-flex; border: 1px solid #d0d0d0; border-radius: 5px; overflow: hidden; flex-shrink: 0; }
    .type-btn {
      padding: 3px 9px; font-size: 11px; font-weight: 500;
      border: none; cursor: pointer; font-family: inherit; transition: background 0.1s;
    }
    .type-btn.on  { background: #185FA5; color: #fff; }
    .type-btn.off { background: #f5f5f5; color: #555; }
    .type-btn.off:hover { background: #e8e8e8; }

    /* ── Link-to select ──────────────────────────────────────────────────── */
    select {
      border: 1px solid #d0d0d0; border-radius: 5px; padding: 4px 6px;
      font-size: 12px; font-family: inherit; background: #fff; color: #1a1a1a;
      max-width: 150px; cursor: pointer;
    }
    select:focus { outline: 2px solid #185FA5; outline-offset: 1px; }

    /* ── Form inputs ─────────────────────────────────────────────────────── */
    input[type="text"], input[type="number"] {
      border: 1px solid #d0d0d0; border-radius: 5px; padding: 4px 8px;
      font-size: 13px; font-family: inherit; background: #fff; color: #1a1a1a;
    }
    input:focus { outline: 2px solid #185FA5; outline-offset: 1px; }
    input[type="range"] { accent-color: #185FA5; flex: 1; min-width: 60px; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    button {
      border: 1px solid #d0d0d0; border-radius: 5px; background: #f5f5f5;
      color: #333; cursor: pointer; font-family: inherit; transition: background 0.1s;
    }
    button:hover { background: #e8e8e8; }

    /* ── Progress bar ────────────────────────────────────────────────────── */
    .bar-track { height: 8px; background: #e8e8e8; border-radius: 4px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.15s ease; }

    /* ── Contribution margin breakdown table ─────────────────────────────── */
    .breakdown { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    .breakdown th {
      text-align: left; font-weight: 500; color: #888; font-size: 11px;
      letter-spacing: 0.04em; padding: 4px 8px; border-bottom: 1px solid #e8e8e8;
    }
    .breakdown td { padding: 5px 8px; border-bottom: 0.5px solid #f2f2f2; font-variant-numeric: tabular-nums; }
    .breakdown tr:last-child td { border-bottom: none; }
    .breakdown td.num { text-align: right; }
    .breakdown th.num { text-align: right; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty { text-align: center; padding: 2.5rem 1rem; color: #aaa; font-size: 13px; }

    /* ── Settings form ───────────────────────────────────────────────────── */
    .field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    .field input { width: 100%; font-size: 13px; }

    /* ── Footer row inside a card ────────────────────────────────────────── */
    .card-footer {
      border-top: 0.5px solid #ebebeb; padding-top: 8px; margin-top: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* ── Hint box ────────────────────────────────────────────────────────── */
    .hint {
      background: #f5f5f5; border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: #666; line-height: 1.6; margin-top: 1rem;
    }

    @media (max-width: 640px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .post-row { flex-wrap: wrap; }
      .post-total { min-width: 70px; }
    }

    /* ── Toolbar (open / save the .xlsx) ─────────────────────────────────── */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; flex-wrap: wrap;
      background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px;
      padding: 8px 12px; margin-bottom: 1rem;
    }
    .toolbar-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toolbar-actions > button, .menu-wrap > button { padding: 6px 12px; font-size: 13px; }
    .menu-wrap { position: relative; display: inline-block; }
    .menu {
      position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
      background: #fff; border: 1px solid #d0d0d0; border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12); min-width: 190px; overflow: hidden;
    }
    .menu button {
      display: block; width: 100%; text-align: left; border: none; border-radius: 0;
      background: #fff; padding: 9px 14px; font-size: 13px;
    }
    .menu button:hover { background: #f0f4ff; color: #185FA5; }
    .status-pill {
      font-size: 12px; padding: 5px 12px; border-radius: 999px;
      font-variant-numeric: tabular-nums; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 60%;
    }
    .status-pill.ok    { background: #eef7e9; color: #3B6D11; }
    .status-pill.dirty { background: #fdf3e3; color: #854F0B; }
    .status-pill.busy  { background: #e8f0fe; color: #185FA5; }
    .status-pill.err   { background: #fbeae5; color: #993C1D; }
    .status-pill.idle  { background: #f0f2f5; color: #888;    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // Format as Swedish kroner: 12500 → "12 500 kr"
  const fmtSEK = (n) =>
    new Intl.NumberFormat("sv-SE", { maximumFractionDigits: 0 }).format(Math.round(n)) + " kr";

  const GREEN = "#3B6D11";
  const RED   = "#993C1D";
  const BLUE  = "#185FA5";
  const AMBER = "#854F0B";

  // ════════════════════════════════════════════════════════════════════════════
  // Persistence — the budget lives in a real .xlsx file (draw.io-style), opened
  // and saved either on this computer or in Google Drive. These are plain helpers;
  // the React app calls them from its toolbar handlers.
  // ════════════════════════════════════════════════════════════════════════════

  const APP_VERSION = "1.0";
  const XLSX_MIME = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";

  // Google Drive config — these are PUBLIC values (not secrets). Paste yours here.
  // See README → "Connect Google Drive". Restrict the API key by HTTP referrer.
  const GOOGLE_CLIENT_ID = "1041888825391-i6njl44sl39es2fjl61kcm9iu4h7jjvs.apps.googleusercontent.com";
  const GOOGLE_API_KEY   = "AIzaSyB-B-IEkd8YvVmhtaHTvLn9x4IDEdSJ2mI";
  const DRIVE_SCOPE      = "https://www.googleapis.com/auth/drive.file";
  const GOOGLE_CONFIGURED =
    GOOGLE_CLIENT_ID && GOOGLE_API_KEY &&
    !GOOGLE_CLIENT_ID.startsWith("PASTE_") && !GOOGLE_API_KEY.startsWith("PASTE_");

  const toNum = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

  // ── .xlsx  ⇄  app state ─────────────────────────────────────────────────────

  // Parse an .xlsx (ArrayBuffer) into the app's state shape.
  function workbookToState(buf) {
    const wb = XLSX.read(buf, { type: "array" });
    const rows = (name) =>
      wb.Sheets[name] ? XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" }) : [];

    const settings = {};
    rows("Settings").forEach((r) => { if (r.Key !== "" && r.Key != null) settings[r.Key] = r.Value; });

    const incomePosts = rows("Income").map((r) => ({
      id:       toNum(r.id),
      name:     r.name == null ? "" : String(r.name),
      type:     r.type === "per-unit" ? "per-unit" : "fixed",
      amount:   toNum(r.amount),
      quantity: toNum(r.quantity),
    }));

    const costPosts = rows("Costs").map((r) => ({
      id:       toNum(r.id),
      name:     r.name == null ? "" : String(r.name),
      type:     r.type === "per-unit" ? "per-unit" : "fixed",
      amount:   toNum(r.amount),
      quantity: toNum(r.quantity),
      linkedTo: (r.linkedTo === "" || r.linkedTo == null) ? null : toNum(r.linkedTo),
    }));

    const ids = incomePosts.concat(costPosts).map((p) => p.id).filter((n) => !isNaN(n));
    const nextId = (ids.length ? Math.max.apply(null, ids) : 0) + 1;

    return {
      eventName:   settings.eventName == null ? "" : String(settings.eventName),
      unitGoal:    toNum(settings.unitGoal),
      revenueGoal: toNum(settings.revenueGoal),
      incomePosts, costPosts, nextId,
    };
  }

  // Serialize the app state into an .xlsx Blob: readable Income/Costs/Settings
  // tabs plus a Summary tab so the file is meaningful even without the app.
  function stateToWorkbookBlob(s) {
    const wb = XLSX.utils.book_new();

    const income = [["id", "name", "type", "amount", "quantity"]].concat(
      s.incomePosts.map((p) => [p.id, p.name, p.type, p.amount, p.quantity])
    );
    const costs = [["id", "name", "type", "amount", "quantity", "linkedTo"]].concat(
      s.costPosts.map((c) => [c.id, c.name, c.type, c.amount, c.quantity, c.linkedTo == null ? "" : c.linkedTo])
    );
    const settings = [
      ["Key", "Value"],
      ["eventName",   s.eventName],
      ["unitGoal",    s.unitGoal],
      ["revenueGoal", s.revenueGoal],
      ["nextId",      s.nextId],
      ["savedAt",     new Date().toISOString()],
      ["appVersion",  APP_VERSION],
    ];

    // Computed totals as plain values, so a viewer sees the real numbers.
    const m = s.summary || {};
    const summary = [
      ["Mått", "Värde (kr)"],
      ["Totala intäkter",                m.totalRevenue],
      ["  varav fasta",                  m.totalFixedIncome],
      ["  varav per enhet",              m.totalUnitIncome],
      ["Totala kostnader",               m.totalCosts],
      ["  varav fasta",                  m.totalFixedCosts],
      ["  varav per enhet",              m.totalUnitCosts],
      ["Resultat",                       m.result],
      ["Sålda enheter",                  m.totalUnitsSold],
      ["Otäckta fasta kostnader",        m.uncoveredFixed],
      ["Bidragsmarginal/enhet (snitt)",  m.weightedMargin],
      ["Nollpunkt (enheter)",            m.breakEvenUnits],
    ];

    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(income),   "Income");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(costs),    "Costs");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(settings), "Settings");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary),  "Summary");

    const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
    return new Blob([out], { type: XLSX_MIME });
  }

  // ── Local files: File System Access API, with a download/upload fallback ─────

  const HAS_FS = typeof window !== "undefined" && "showSaveFilePicker" in window;
  const FS_TYPES = [{ description: "Excel-arbetsbok", accept: { [XLSX_MIME]: [".xlsx"] } }];

  async function localOpen() {
    if (HAS_FS) {
      const [handle] = await window.showOpenFilePicker({ types: FS_TYPES, multiple: false });
      const file = await handle.getFile();
      return { handle, name: file.name, buf: await file.arrayBuffer() };
    }
    // Fallback (Firefox/Safari): hidden file input. Note: cancel fires no event.
    return await new Promise((resolve) => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".xlsx";
      input.onchange = async () => {
        const file = input.files && input.files[0];
        resolve(file ? { handle: null, name: file.name, buf: await file.arrayBuffer() } : null);
      };
      input.click();
    });
  }

  async function localSave(blob, suggestedName, handle) {
    if (HAS_FS) {
      let h = handle;
      if (!h) h = await window.showSaveFilePicker({ suggestedName, types: FS_TYPES });
      const w = await h.createWritable();
      await w.write(blob);
      await w.close();
      return { handle: h, name: (h.name || suggestedName) };
    }
    // Fallback: download a fresh copy each time.
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = suggestedName;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    return { handle: null, name: suggestedName };
  }

  // ── Google Drive: GIS token + Picker (open) + Drive REST v3 (read/write) ─────

  let _tokenClient = null;
  let _accessToken = null;

  function getToken() {
    return new Promise((resolve, reject) => {
      if (!(window.google && google.accounts && google.accounts.oauth2))
        return reject(new Error("Google-inloggning laddas fortfarande — försök igen om en sekund."));
      if (!_tokenClient) {
        _tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID, scope: DRIVE_SCOPE, callback: () => {},
        });
      }
      _tokenClient.callback = (resp) => {
        if (resp && resp.error) return reject(new Error("Google-inloggning misslyckades: " + resp.error));
        _accessToken = resp.access_token;
        resolve(_accessToken);
      };
      _tokenClient.requestAccessToken({ prompt: "" });
    });
  }

  async function driveRequest(url, opts) {
    opts = opts || {};
    const send = async () => {
      const token = await getToken();
      return fetch(url, Object.assign({}, opts, {
        headers: Object.assign({}, opts.headers || {}, { Authorization: "Bearer " + token }),
      }));
    };
    let r = await send();
    if (r.status === 401) { _accessToken = null; r = await send(); }   // token expired → refresh once
    if (!r.ok) throw new Error("Google Drive-fel " + r.status + ": " + (await r.text()).slice(0, 180));
    return r;
  }

  async function driveDownload(fileId) {
    const r = await driveRequest("https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media");
    return await r.arrayBuffer();
  }

  async function driveSaveNew(blob, name) {
    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify({ name, mimeType: XLSX_MIME })], { type: "application/json" }));
    form.append("file", blob);
    const r = await driveRequest(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name",
      { method: "POST", body: form }
    );
    return await r.json();
  }

  async function driveSaveExisting(blob, fileId) {
    const r = await driveRequest(
      "https://www.googleapis.com/upload/drive/v3/files/" + fileId + "?uploadType=media&fields=id,name",
      { method: "PATCH", body: blob }
    );
    return await r.json();
  }

  function ensurePicker() {
    return new Promise((resolve, reject) => {
      if (!window.gapi) return reject(new Error("Google API laddas fortfarande — försök igen."));
      if (window.google && google.picker) return resolve();
      gapi.load("picker", { callback: resolve, onerror: () => reject(new Error("Kunde inte ladda Google Picker.")) });
    });
  }

  async function driveOpen() {
    if (!GOOGLE_CONFIGURED)
      throw new Error("Google Drive är inte konfigurerat ännu — lägg in Client ID och API-nyckel (se README).");
    const token = await getToken();
    await ensurePicker();
    return await new Promise((resolve, reject) => {
      try {
        const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
          .setMimeTypes(XLSX_MIME)
          .setMode(google.picker.DocsViewMode.LIST);
        const picker = new google.picker.PickerBuilder()
          .setOAuthToken(token)
          .setDeveloperKey(GOOGLE_API_KEY)
          .addView(view)
          .setTitle("Välj din budget (.xlsx)")
          .setCallback((data) => {
            const A = google.picker.Action;
            if (data.action === A.PICKED) {
              const doc = data.docs[0];
              driveDownload(doc.id)
                .then((buf) => resolve({ fileId: doc.id, name: doc.name, buf }))
                .catch(reject);
            } else if (data.action === A.CANCEL) {
              resolve(null);
            }
          })
          .build();
        picker.setVisible(true);
      } catch (e) { reject(e); }
    });
  }

  // ── Reusable components ────────────────────────────────────────────────────

  function MetricCard({ label, value, color }) {
    return (
      <div className="metric-card">
        <div className="metric-label">{label}</div>
        <div className="metric-value" style={{ color }}>{value}</div>
      </div>
    );
  }

  // Segmented control that switches between "fixed" and "per-unit" post types
  function TypeToggle({ value, onChange }) {
    return (
      <div className="type-toggle">
        {[["fixed", "Fast"], ["per-unit", "Per enhet"]].map(([v, label]) => (
          <button key={v} className={`type-btn ${value === v ? "on" : "off"}`} onClick={() => onChange(v)}>
            {label}
          </button>
        ))}
      </div>
    );
  }

  function ProgressBar({ pct, color }) {
    return (
      <div className="bar-track">
        <div className="bar-fill" style={{ width: `${Math.min(pct, 100)}%`, background: color }} />
      </div>
    );
  }

  // ── Main app ───────────────────────────────────────────────────────────────

  function App() {
    // ── State ────────────────────────────────────────────────────────────────

    const [tab,         setTab]         = useState("income");
    const [eventName,   setEventName]   = useState("");
    const [unitGoal,    setUnitGoal]    = useState(0);
    const [revenueGoal, setRevenueGoal] = useState(0);
    const [nextId,      setNextId]      = useState(1);

    // Income post: { id, name, type: "fixed"|"per-unit", amount, quantity }
    // - fixed:    earns `amount` kr regardless of units sold (e.g. sponsorship)
    // - per-unit: earns `amount` kr × `quantity` units sold (e.g. ticket type)
    const [incomePosts, setIncomePosts] = useState([]);

    // Cost post: { id, name, type: "fixed"|"per-unit", amount, quantity, linkedTo }
    // - fixed:    costs `amount` kr regardless (e.g. venue rental)
    // - per-unit: costs `amount` kr × quantity; quantity either:
    //     - inherited from a per-unit income post when linkedTo = that post's id
    //     - set manually when linkedTo = null
    const [costPosts, setCostPosts] = useState([]);

    // ── Persistence / open-file state ────────────────────────────────────────
    const [currentFile, setCurrentFile] = useState(null);  // {provider,name,handle,fileId} | null
    const [status,      setStatus]      = useState("idle"); // idle | opening | saving | error
    const [errMsg,      setErrMsg]      = useState("");
    const [dirty,       setDirty]       = useState(false);
    const [savedAt,     setSavedAt]     = useState(null);
    const [menu,        setMenu]        = useState(null);   // null | 'open' | 'saveas'
    const skipDirty = useRef(true);                          // skip the first dirty-effect run / after a load

    // ── Derived calculations ─────────────────────────────────────────────────

    const perUnitIncome = incomePosts.filter(p => p.type === "per-unit");

    // Total revenue = sum of all income posts
    const totalFixedIncome = incomePosts
      .filter(p => p.type === "fixed")
      .reduce((s, p) => s + (p.amount || 0), 0);

    const totalUnitIncome = perUnitIncome
      .reduce((s, p) => s + (p.amount || 0) * (p.quantity || 0), 0);

    const totalRevenue = totalFixedIncome + totalUnitIncome;

    // Resolve the effective quantity for a per-unit cost post.
    // If linkedTo is set, inherit the linked income post's current quantity.
    const effectiveQty = (cp) => {
      if (cp.linkedTo) {
        const src = incomePosts.find(p => p.id === cp.linkedTo && p.type === "per-unit");
        return src ? (src.quantity || 0) : 0;
      }
      return cp.quantity || 0;
    };

    // Total costs = sum of all cost posts
    const totalFixedCosts = costPosts
      .filter(p => p.type === "fixed")
      .reduce((s, p) => s + (p.amount || 0), 0);

    const totalUnitCosts = costPosts
      .filter(p => p.type === "per-unit")
      .reduce((s, p) => s + (p.amount || 0) * effectiveQty(p), 0);

    const totalCosts = totalFixedCosts + totalUnitCosts;
    const result     = totalRevenue - totalCosts;

    // ── Break-even calculation ───────────────────────────────────────────────

    // Standalone per-unit costs (not linked to any income post) have a fixed manual
    // quantity, so they don't scale with sales — treat them as fixed for break-even.
    const standaloneCosts = costPosts
      .filter(p => p.type === "per-unit" && !p.linkedTo)
      .reduce((s, p) => s + (p.amount || 0) * (p.quantity || 0), 0);

    // The amount that per-unit sales must cover after fixed income and standalone costs
    const uncoveredFixed = totalFixedCosts + standaloneCosts - totalFixedIncome;

    // For each per-unit income post, compute variable cost per unit from all cost
    // posts that are linked to it. This is the contribution margin per unit.
    const varCostFor = (incomeId) =>
      costPosts
        .filter(p => p.type === "per-unit" && p.linkedTo === incomeId)
        .reduce((s, p) => s + (p.amount || 0), 0);

    const margins = perUnitIncome.map(p => ({
      id:      p.id,
      name:    p.name || "(namnlös)",
      price:   p.amount   || 0,
      varCost: varCostFor(p.id),
      // Contribution margin = price per unit − variable cost per unit
      margin:  (p.amount || 0) - varCostFor(p.id),
      qty:     p.quantity || 0,
    }));

    // Weighted-average contribution margin across all per-unit income posts.
    // Uses actual quantities as weights; falls back to equal weights when qty = 0.
    const totalQty = margins.reduce((s, m) => s + m.qty, 0);
    const weightedMargin = margins.length === 0
      ? 0
      : totalQty > 0
        ? margins.reduce((s, m) => s + m.margin * m.qty, 0) / totalQty
        : margins.reduce((s, m) => s + m.margin, 0) / margins.length;

    // Break-even = uncoveredFixed ÷ weightedContributionMargin
    // If uncoveredFixed ≤ 0, fixed income already covers everything → 0 units needed.
    const breakEvenUnits =
      weightedMargin <= 0 ? null :
      uncoveredFixed <= 0 ? 0    :
      Math.ceil(uncoveredFixed / weightedMargin);

    const totalUnitsSold = perUnitIncome.reduce((s, p) => s + (p.quantity || 0), 0);

    // Slider max = 1.5× unit goal, or 500 if no goal is set
    const sliderMax = Math.max(unitGoal > 0 ? Math.ceil(unitGoal * 1.5) : 500, 100);

    // ── Mutations ─────────────────────────────────────────────────────────────

    const NUM = new Set(["amount", "quantity"]);

    const updIncome = (id, field, val) =>
      setIncomePosts(ps => ps.map(p =>
        p.id !== id ? p : { ...p, [field]: NUM.has(field) ? parseFloat(val) || 0 : val }
      ));

    const delIncome = (id) => {
      setIncomePosts(ps => ps.filter(p => p.id !== id));
      // Unlink any cost posts that referenced the deleted income post
      setCostPosts(cs => cs.map(c => c.linkedTo === id ? { ...c, linkedTo: null } : c));
    };

    const addIncome = () => {
      setIncomePosts(ps => [...ps, { id: nextId, name: "", type: "fixed", amount: 0, quantity: 0 }]);
      setNextId(n => n + 1);
    };

    const updCost = (id, field, val) =>
      setCostPosts(cs => cs.map(c => {
        if (c.id !== id) return c;
        let coerced = NUM.has(field) ? parseFloat(val) || 0
                    : field === "linkedTo" ? (+val || null)   // "" → 0 → null
                    : val;
        const updated = { ...c, [field]: coerced };
        // Clear the link when switching a cost post back to fixed type
        if (field === "type" && val === "fixed") updated.linkedTo = null;
        return updated;
      }));

    const delCost = (id) => setCostPosts(cs => cs.filter(c => c.id !== id));

    const addCost = () => {
      setCostPosts(cs => [...cs, { id: nextId, name: "", type: "fixed", amount: 0, quantity: 0, linkedTo: null }]);
      setNextId(n => n + 1);
    };

    // Resolve linkedTo for rendering: guard against stale ids after an income post is deleted
    const resolveLink = (cp) => {
      if (!cp.linkedTo) return null;
      return perUnitIncome.some(p => p.id === cp.linkedTo) ? cp.linkedTo : null;
    };

    // ── Open / Save (local file or Google Drive) ──────────────────────────────

    // Everything we persist, including computed totals for the Summary tab.
    const collectState = () => ({
      eventName, unitGoal, revenueGoal, nextId, incomePosts, costPosts,
      summary: {
        totalRevenue, totalFixedIncome, totalUnitIncome,
        totalCosts, totalFixedCosts, totalUnitCosts,
        result, totalUnitsSold, uncoveredFixed, weightedMargin,
        breakEvenUnits: breakEvenUnits == null ? "" : breakEvenUnits,
      },
    });

    // Push a freshly-loaded workbook into state without tripping the dirty flag.
    const applyState = (s) => {
      skipDirty.current = true;
      setEventName(s.eventName);
      setUnitGoal(s.unitGoal);
      setRevenueGoal(s.revenueGoal);
      setIncomePosts(s.incomePosts);
      setCostPosts(s.costPosts);
      setNextId(s.nextId);
      setDirty(false);
    };

    const fileBaseName = () =>
      ((eventName || "budget").trim().replace(/[\\/:*?"<>|]+/g, "_").replace(/\s+/g, "_") || "budget") + ".xlsx";

    const fail = (e) => { console.error(e); setErrMsg((e && e.message) ? e.message : String(e)); setStatus("error"); };
    const cancelled = (e) => e && (e.name === "AbortError" || e.code === 20);

    const doOpen = async (provider) => {
      setMenu(null);
      try {
        setStatus("opening");
        const res = provider === "local" ? await localOpen() : await driveOpen();
        if (!res) { setStatus("idle"); return; }              // user cancelled the picker
        applyState(workbookToState(res.buf));
        setCurrentFile({ provider, name: res.name, handle: res.handle || null, fileId: res.fileId || null });
        setSavedAt(null);
        setStatus("idle");
      } catch (e) { if (cancelled(e)) setStatus("idle"); else fail(e); }
    };

    const doSave = async (override) => {
      setMenu(null);
      const provider = override || (currentFile && currentFile.provider);
      if (!provider) { setMenu("saveas"); return; }            // nothing open yet → ask where
      try {
        if (provider === "drive" && !GOOGLE_CONFIGURED)
          throw new Error("Google Drive är inte konfigurerat ännu — se README.");
        setStatus("saving");
        const blob = stateToWorkbookBlob(collectState());
        const name = (!override && currentFile && currentFile.name) ? currentFile.name : fileBaseName();
        if (provider === "local") {
          const reuse = (!override && currentFile && currentFile.provider === "local") ? currentFile.handle : null;
          const r = await localSave(blob, name, reuse);
          setCurrentFile({ provider: "local", name: r.name, handle: r.handle, fileId: null });
        } else {
          const reuseId = (!override && currentFile && currentFile.provider === "drive") ? currentFile.fileId : null;
          const r = reuseId ? await driveSaveExisting(blob, reuseId) : await driveSaveNew(blob, name);
          setCurrentFile({ provider: "drive", name: (r.name || name), handle: null, fileId: (r.id || reuseId) });
        }
        setDirty(false);
        setSavedAt(new Date());
        setStatus("idle");
      } catch (e) { if (cancelled(e)) setStatus("idle"); else fail(e); }
    };

    const onSaveClick = () => {
      if (currentFile) doSave();
      else setMenu(menu === "saveas" ? null : "saveas");
    };

    const onNew = () => {
      setMenu(null);
      if (dirty && !window.confirm("Du har osparade ändringar. Skapa en ny budget ändå?")) return;
      applyState({ eventName: "", unitGoal: 0, revenueGoal: 0, incomePosts: [], costPosts: [], nextId: 1 });
      setCurrentFile(null);
      setSavedAt(null);
      setStatus("idle");
    };

    // Mark unsaved whenever the budget changes (skipped right after a load / new).
    useEffect(() => {
      if (skipDirty.current) { skipDirty.current = false; return; }
      setDirty(true);
    }, [incomePosts, costPosts, eventName, unitGoal, revenueGoal]);

    // Warn before leaving with unsaved changes.
    useEffect(() => {
      const h = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ""; } };
      window.addEventListener("beforeunload", h);
      return () => window.removeEventListener("beforeunload", h);
    }, [dirty]);

    // Close the toolbar dropdown when clicking elsewhere.
    useEffect(() => {
      if (!menu) return;
      const close = () => setMenu(null);
      const id = setTimeout(() => document.addEventListener("click", close), 0);
      return () => { clearTimeout(id); document.removeEventListener("click", close); };
    }, [menu]);

    // ── Status pill ───────────────────────────────────────────────────────────
    const providerLabel = currentFile ? (currentFile.provider === "drive" ? "Google Drive" : "Den här datorn") : null;
    let statusText, statusClass;
    if (status === "opening")      { statusText = "Öppnar…";        statusClass = "busy"; }
    else if (status === "saving")  { statusText = "Sparar…";        statusClass = "busy"; }
    else if (status === "error")   { statusText = "⚠ " + errMsg;    statusClass = "err";  }
    else if (currentFile) {
      const tail = dirty ? "● Osparade ändringar"
                 : savedAt ? "Sparad " + savedAt.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" })
                 : "Öppnad";
      statusText = currentFile.name + " · " + providerLabel + " · " + tail;
      statusClass = dirty ? "dirty" : "ok";
    } else {
      statusText = dirty ? "● Osparad ny budget" : "Ingen fil öppen";
      statusClass = dirty ? "dirty" : "idle";
    }

    // ── Render ────────────────────────────────────────────────────────────────

    return (
      <div className="app">

        {/* ── Toolbar: open/save the .xlsx on this computer or in Google Drive ─ */}
        <div className="toolbar">
          <div className="toolbar-actions">
            <div className="menu-wrap">
              <button onClick={(e) => { e.stopPropagation(); setMenu(menu === "open" ? null : "open"); }}>
                📂 Öppna ▾
              </button>
              {menu === "open" && (
                <div className="menu">
                  <button onClick={() => doOpen("local")}>Från den här datorn</button>
                  <button onClick={() => doOpen("drive")}>Från Google Drive</button>
                </div>
              )}
            </div>

            <button onClick={onSaveClick} title="Spara till den öppna filen">💾 Spara</button>

            <div className="menu-wrap">
              <button onClick={(e) => { e.stopPropagation(); setMenu(menu === "saveas" ? null : "saveas"); }}>
                Spara som ▾
              </button>
              {menu === "saveas" && (
                <div className="menu">
                  <button onClick={() => doSave("local")}>Till den här datorn</button>
                  <button onClick={() => doSave("drive")}>Till Google Drive</button>
                </div>
              )}
            </div>

            <button onClick={onNew} title="Börja om med en tom budget">✨ Ny</button>
          </div>

          <div className={"status-pill " + statusClass} title={statusText}>{statusText}</div>
        </div>

        {/* ── Help banner ────────────────────────────────────────────────── */}
        <div className="help">
          <h1>{eventName || "Event Budget Calculator"}</h1>
          <p>
            Add income and cost posts below. Each post is either <strong>Fast</strong> (a fixed amount regardless of
            units sold) or <strong>Per enhet</strong> (amount × quantity). Per-unit cost posts can be linked to a
            per-unit income post to automatically mirror its quantity — useful for costs that follow ticket sales.
            The <em>Rapport</em> tab shows a real-time break-even analysis.
          </p>
        </div>

        {/* ── Summary row — always visible ───────────────────────────────── */}
        <div className="metrics-grid">
          <MetricCard label="Totala intäkter"  value={fmtSEK(totalRevenue)} color={GREEN} />
          <MetricCard label="Totala kostnader" value={fmtSEK(totalCosts)}   color={RED}   />
          <MetricCard
            label="Sålda enheter"
            value={unitGoal > 0 ? `${totalUnitsSold} / ${unitGoal}` : String(totalUnitsSold)}
            color={BLUE}
          />
          <MetricCard label="Resultat" value={fmtSEK(result)} color={result >= 0 ? GREEN : RED} />
        </div>

        {/* ── Tab bar ────────────────────────────────────────────────────── */}
        <div className="tab-bar">
          {[
            { id: "income",   label: "Intäkter"      },
            { id: "costs",    label: "Kostnader"     },
            { id: "report",   label: "Rapport"       },
            { id: "settings", label: "Inställningar" },
          ].map(t => (
            <button key={t.id} className={`tab-btn${tab === t.id ? " active" : ""}`} onClick={() => setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ════════════════════════════════════════════════════════════════ */}
        {/* ── Intäkter ─────────────────────────────────────────────────── */}
        {/* ════════════════════════════════════════════════════════════════ */}
        {tab === "income" && (
          <div className="card">
            <div className="sec-label">Intäktsposter</div>

            {incomePosts.length === 0 && (
              <div className="empty">Inga poster än — klicka "+ Lägg till post" för att börja.</div>
            )}

            {incomePosts.map(p => (
              <div key={p.id} className="post-row">
                <input
                  className="post-name"
                  value={p.name}
                  onChange={e => updIncome(p.id, "name", e.target.value)}
                  placeholder="Benämning (t.ex. Biljett standard, Sponsor)"
                />
                <TypeToggle value={p.type} onChange={v => updIncome(p.id, "type", v)} />
                <input
                  type="number" min={0}
                  className="post-amount"
                  value={p.amount}
                  onChange={e => updIncome(p.id, "amount", e.target.value)}
                  placeholder={p.type === "per-unit" ? "Pris/enhet" : "Belopp"}
                  title={p.type === "per-unit" ? "Pris per enhet (kr)" : "Fast belopp (kr)"}
                />

                {/* Per-unit: show a slider + count input */}
                {p.type === "per-unit" && (
                  <>
                    <span style={{ fontSize: 13, color: "#999", flexShrink: 0 }}>×</span>
                    <input
                      type="range" min={0} max={sliderMax} step={1}
                      value={p.quantity}
                      onChange={e => updIncome(p.id, "quantity", e.target.value)}
                    />
                    <input
                      type="number" min={0}
                      className="post-qty"
                      value={p.quantity}
                      onChange={e => updIncome(p.id, "quantity", e.target.value)}
                      title="Antal sålda enheter"
                    />
                    <span className="post-total" style={{ color: GREEN }}>
                      {fmtSEK((p.amount || 0) * (p.quantity || 0))}
                    </span>
                  </>
                )}

                {/* Fixed: just show the amount as the total */}
                {p.type === "fixed" && (
                  <span className="post-total" style={{ color: GREEN }}>{fmtSEK(p.amount || 0)}</span>
                )}

                <button onClick={() => delIncome(p.id)} aria-label="Ta bort" style={{ padding: "2px 7px", fontSize: 13, flexShrink: 0 }}>×</button>
              </div>
            ))}

            <div className={`card-footer${incomePosts.length === 0 ? " no-border" : ""}`}
                 style={{ borderTop: incomePosts.length > 0 ? undefined : "none", marginTop: incomePosts.length > 0 ? undefined : 0 }}>
              <button onClick={addIncome} style={{ fontSize: 12, padding: "5px 12px" }}>
                + Lägg till post
              </button>
              {incomePosts.length > 0 && (
                <span style={{ fontSize: 12, fontWeight: 500, color: GREEN, fontVariantNumeric: "tabular-nums" }}>
                  Totalt: {fmtSEK(totalRevenue)}
                </span>
              )}
            </div>
          </div>
        )}

        {/* ════════════════════════════════════════════════════════════════ */}
        {/* ── Kostnader ────────────────────────────────────────────────── */}
        {/* ════════════════════════════════════════════════════════════════ */}
        {tab === "costs" && (
          <div className="card">
            <div className="sec-label">Kostnadsposter</div>

            {costPosts.length === 0 && (
              <div className="empty">Inga poster än — klicka "+ Lägg till post" för att börja.</div>
            )}

            {costPosts.map(c => {
              const link = resolveLink(c);
              return (
                <div key={c.id} className="post-row">
                  <input
                    className="post-name"
                    value={c.name}
                    onChange={e => updCost(c.id, "name", e.target.value)}
                    placeholder="Benämning (t.ex. Lokalhyra, Bordhyra)"
                  />
                  <TypeToggle value={c.type} onChange={v => updCost(c.id, "type", v)} />
                  <input
                    type="number" min={0}
                    className="post-amount"
                    value={c.amount}
                    onChange={e => updCost(c.id, "amount", e.target.value)}
                    placeholder={c.type === "per-unit" ? "Kostnad/enhet" : "Belopp"}
                    title={c.type === "per-unit" ? "Kostnad per enhet (kr)" : "Fast belopp (kr)"}
                  />

                  {/* Per-unit: link to an income post, or set quantity manually */}
                  {c.type === "per-unit" && (
                    <>
                      <span style={{ fontSize: 13, color: "#999", flexShrink: 0 }}>×</span>

                      {/* Dropdown: "Manuellt" or any per-unit income post */}
                      <select
                        value={link ?? ""}
                        onChange={e => updCost(c.id, "linkedTo", e.target.value)}
                        title="Koppla till en intäktspost för att följa dess antal, eller ange manuellt"
                      >
                        <option value="">Manuellt</option>
                        {perUnitIncome.map(ip => (
                          <option key={ip.id} value={ip.id}>{ip.name || `Post #${ip.id}`}</option>
                        ))}
                      </select>

                      {/* When linked, show the inherited quantity as read-only text */}
                      {link ? (
                        <span style={{ fontSize: 12, color: "#555", minWidth: 58, textAlign: "center", flexShrink: 0 }}>
                          {effectiveQty(c)} st
                        </span>
                      ) : (
                        <input
                          type="number" min={0}
                          className="post-qty"
                          value={c.quantity}
                          onChange={e => updCost(c.id, "quantity", e.target.value)}
                          title="Antal enheter"
                        />
                      )}

                      <span className="post-total" style={{ color: RED }}>
                        {fmtSEK((c.amount || 0) * effectiveQty(c))}
                      </span>
                    </>
                  )}

                  {c.type === "fixed" && (
                    <span className="post-total" style={{ color: RED }}>{fmtSEK(c.amount || 0)}</span>
                  )}

                  <button onClick={() => delCost(c.id)} aria-label="Ta bort" style={{ padding: "2px 7px", fontSize: 13, flexShrink: 0 }}>×</button>
                </div>
              );
            })}

            <div className="card-footer" style={{ borderTop: costPosts.length > 0 ? undefined : "none", marginTop: costPosts.length > 0 ? undefined : 0 }}>
              <button onClick={addCost} style={{ fontSize: 12, padding: "5px 12px" }}>
                + Lägg till post
              </button>
              {costPosts.length > 0 && (
                <span style={{ fontSize: 12, fontWeight: 500, color: RED, fontVariantNumeric: "tabular-nums" }}>
                  Totalt: {fmtSEK(totalCosts)}
                </span>
              )}
            </div>
          </div>
        )}

        {/* ════════════════════════════════════════════════════════════════ */}
        {/* ── Rapport ──────────────────────────────────────────────────── */}
        {/* ════════════════════════════════════════════════════════════════ */}
        {tab === "report" && (
          <div>
            {/* Break-even key metrics */}
            <div className="card" style={{ marginBottom: 14 }}>
              <div className="sec-label">Nollpunktanalys</div>

              <div className="metrics-grid" style={{ marginBottom: "1.125rem" }}>

                {/* Fixed costs not offset by fixed income — must be covered by unit sales */}
                <MetricCard
                  label="Fasta kostnader ej täckta av fast inkomst"
                  value={fmtSEK(uncoveredFixed)}
                  color={uncoveredFixed <= 0 ? GREEN : RED}
                />

                {/* Weighted-average contribution margin per unit sold */}
                <MetricCard
                  label="Bidragsmarginal per enhet (viktat snitt)"
                  value={margins.length > 0 ? fmtSEK(weightedMargin) : "—"}
                  color={weightedMargin > 0 ? GREEN : RED}
                />

                {/* Break-even = uncoveredFixed ÷ weightedMargin */}
                <MetricCard
                  label="Nollpunkt — antal enheter"
                  value={
                    breakEvenUnits === null ? "—" :
                    breakEvenUnits === 0    ? "Täckt av fast inkomst!" :
                    `${breakEvenUnits} enheter`
                  }
                  color={
                    breakEvenUnits === null                             ? "#444" :
                    breakEvenUnits === 0                               ? GREEN  :
                    unitGoal > 0 && breakEvenUnits <= unitGoal         ? GREEN  :
                    totalUnitsSold > 0 && breakEvenUnits <= totalUnitsSold ? GREEN :
                    RED
                  }
                />

                {/* Current profit/loss */}
                <MetricCard
                  label="Resultat"
                  value={fmtSEK(result)}
                  color={result >= 0 ? GREEN : RED}
                />
              </div>

              {/* Contribution margin breakdown per per-unit income post */}
              {margins.length > 0 && (
                <>
                  <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.06em", color: "#888", textTransform: "uppercase", marginBottom: 4 }}>
                    Bidragsmarginal per intäktspost
                  </div>
                  <table className="breakdown">
                    <thead>
                      <tr>
                        <th>Post</th>
                        <th className="num">Pris/enhet</th>
                        <th className="num">Rörlig kostnad/enhet</th>
                        <th className="num">Marginal/enhet</th>
                        <th className="num">Antal</th>
                        <th className="num">Täckningsbidrag</th>
                      </tr>
                    </thead>
                    <tbody>
                      {margins.map(m => (
                        <tr key={m.id}>
                          <td>{m.name}</td>
                          <td className="num">{fmtSEK(m.price)}</td>
                          <td className="num">{fmtSEK(m.varCost)}</td>
                          <td className="num" style={{ color: m.margin >= 0 ? GREEN : RED }}>{fmtSEK(m.margin)}</td>
                          <td className="num">{m.qty}</td>
                          <td className="num" style={{ color: m.margin * m.qty >= 0 ? GREEN : RED }}>
                            {fmtSEK(m.margin * m.qty)}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </>
              )}

              {margins.length === 0 && (
                <p style={{ fontSize: 12, color: "#aaa" }}>
                  Lägg till intäktsposter av typen "Per enhet" för att se bidragsmarginalen.
                </p>
              )}
            </div>

            {/* Goal progress bars */}
            <div className="card">
              <div className="sec-label">Måluppfyllelse</div>

              {/* Only render bars where a goal has been set or there's data to show */}
              {(() => {
                const bars = [
                  unitGoal > 0 && {
                    label:  "Sålda enheter mot mål",
                    detail: `${totalUnitsSold} / ${unitGoal}`,
                    pct:    Math.round((totalUnitsSold / unitGoal) * 100),
                    color:  BLUE,
                  },
                  revenueGoal > 0 && {
                    label:  "Intäkter mot mål",
                    detail: `${fmtSEK(totalRevenue)} / ${fmtSEK(revenueGoal)}`,
                    pct:    Math.round((totalRevenue / revenueGoal) * 100),
                    color:  GREEN,
                  },
                  totalCosts > 0 && {
                    label:  "Intäkter / kostnader",
                    detail: `${Math.round((totalRevenue / Math.max(totalCosts, 1)) * 100)}% täckt`,
                    pct:    Math.round((totalRevenue / Math.max(totalCosts, 1)) * 100),
                    color:  result >= 0 ? GREEN : RED,
                  },
                ].filter(Boolean);

                if (bars.length === 0) {
                  return (
                    <p style={{ fontSize: 12, color: "#aaa" }}>
                      Sätt mål i Inställningar och lägg till poster för att se framsteg.
                    </p>
                  );
                }

                return bars.map(b => (
                  <div key={b.label} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#666", marginBottom: 4 }}>
                      <span>{b.label}</span>
                      <span>{b.detail}</span>
                    </div>
                    <ProgressBar pct={b.pct} color={b.color} />
                  </div>
                ));
              })()}
            </div>
          </div>
        )}

        {/* ════════════════════════════════════════════════════════════════ */}
        {/* ── Inställningar ────────────────────────────────────────────── */}
        {/* ════════════════════════════════════════════════════════════════ */}
        {tab === "settings" && (
          <div className="card">
            <div className="sec-label">Evenemang</div>
            <div className="field" style={{ marginBottom: "1.25rem" }}>
              <label>Evenemangsnamn — visas i rubriken ovan</label>
              <input
                type="text"
                value={eventName}
                onChange={e => setEventName(e.target.value)}
                placeholder="Mitt event 2026"
              />
            </div>

            <div className="sec-label">Mål</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: "1rem" }}>
              <div className="field">
                <label>Målantal sålda enheter (t.ex. biljetter)</label>
                <input
                  type="number" min={0}
                  value={unitGoal}
                  onChange={e => setUnitGoal(+e.target.value)}
                />
              </div>
              <div className="field">
                <label>Intäktsmål (kr)</label>
                <input
                  type="number" min={0}
                  value={revenueGoal}
                  onChange={e => setRevenueGoal(+e.target.value)}
                  style={{ textAlign: "right" }}
                />
              </div>
            </div>

            <div className="hint">
              <strong>Hur break-even beräknas</strong><br />
              Fasta kostnader som inte täcks av fasta intäkter (t.ex. sponsring) kallas
              <em> otäckta fasta kostnader</em>. Dessa måste täckas av per-enhets-försäljning.
              Bidragsmarginalen per enhet = pris/enhet − rörlig kostnad/enhet (kostnadsposter länkade till den intäktsposten).
              Nollpunkt = otäckta fasta kostnader ÷ viktat snitt av bidragsmarginalen.
            </div>
          </div>
        )}

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
